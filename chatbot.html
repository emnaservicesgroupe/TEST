<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>آمنة فيزا سيرفيس - شات بوت</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #f5f5f5;
    }

    /* Floating Button */
    #wa-float-btn {
      position: fixed;
      bottom: 20px;
      right: 20px;
      width: 60px;
      height: 60px;
      border-radius: 50%;
      border: none;
      background: #25d366;
      color: white;
      cursor: pointer;
      box-shadow: 0 4px 16px rgba(37, 211, 102, 0.4);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: transform 0.3s, box-shadow 0.3s;
      animation: pulse 2s infinite;
    }

    #wa-float-btn:hover {
      transform: scale(1.1);
      box-shadow: 0 6px 20px rgba(37, 211, 102, 0.6);
    }

    #wa-float-btn svg { pointer-events: none; }

    /* Notification Badge */
    #wa-badge {
      position: fixed;
      bottom: 68px;
      right: 16px;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: #ff4444;
      color: white;
      font-size: 12px;
      font-weight: bold;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 2px solid white;
      z-index: 10000;
      pointer-events: none;
    }

    /* Chat Window */
    #wa-chat {
      position: fixed;
      bottom: 90px;
      right: 20px;
      width: 370px;
      height: 550px;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 8px 32px rgba(0,0,0,0.15);
      display: none;
      flex-direction: column;
      z-index: 9999;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    #wa-chat.open {
      display: flex;
    }

    /* Header */
    #wa-header {
      background: linear-gradient(135deg, #075e54 0%, #128c7e 100%);
      color: white;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    #wa-avatar {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: #25d366;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    #wa-header-info { flex: 1; }
    #wa-header-name { font-weight: bold; font-size: 15px; }
    #wa-header-status { font-size: 12px; opacity: 0.9; }

    #wa-close-btn {
      background: none;
      border: none;
      color: white;
      cursor: pointer;
      padding: 4px;
      border-radius: 50%;
      display: flex;
      align-items: center;
    }

    /* Messages Area */
    #wa-messages {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
      background-color: #e5ddd5;
      background-image: url("data:image/svg+xml,%3Csvg width='400' height='400' xmlns='http://www.w3.org/2000/svg'%3E%3Cdefs%3E%3Cpattern id='p' width='60' height='60' patternUnits='userSpaceOnUse'%3E%3Cpath d='M30 5 L35 15 L30 25 L25 15Z' fill='%23d4ccb5' opacity='0.3'/%3E%3C/pattern%3E%3C/defs%3E%3Crect fill='%23e5ddd5' width='400' height='400'/%3E%3Crect fill='url(%23p)' width='400' height='400'/%3E%3C/svg%3E");
    }

    .wa-msg {
      display: flex;
      margin-bottom: 8px;
    }

    .wa-msg.user { justify-content: flex-start; }
    .wa-msg.bot { justify-content: flex-end; }

    .wa-bubble {
      max-width: 85%;
      padding: 8px 12px;
      box-shadow: 0 1px 2px rgba(0,0,0,0.1);
      direction: rtl;
      text-align: right;
    }

    .wa-msg.user .wa-bubble {
      background: #ffffff;
      border-radius: 12px 12px 12px 4px;
    }

    .wa-msg.bot .wa-bubble {
      background: #dcf8c6;
      border-radius: 12px 12px 4px 12px;
    }

    .wa-bubble-text {
      font-size: 14px;
      line-height: 1.5;
      white-space: pre-line;
      color: #303030;
    }

    .wa-bubble-time {
      font-size: 11px;
      color: #999;
      text-align: left;
      margin-top: 4px;
    }

    /* Quick Replies */
    .wa-quick-replies {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      justify-content: flex-end;
      margin-bottom: 10px;
      direction: rtl;
    }

    .wa-qr-btn {
      padding: 6px 14px;
      border-radius: 18px;
      border: 1px solid #25d366;
      background: white;
      color: #075e54;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
      font-family: inherit;
    }

    .wa-qr-btn:hover {
      background: #25d366;
      color: white;
    }

    /* WhatsApp Action Button */
    .wa-action-btn {
      padding: 10px 20px;
      border-radius: 24px;
      border: none;
      background: #25d366;
      color: white;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-family: inherit;
    }

    .wa-action-wrap {
      display: flex;
      justify-content: flex-end;
      margin-bottom: 10px;
    }

    /* Typing Indicator */
    .wa-typing {
      display: flex;
      justify-content: flex-end;
      margin-bottom: 8px;
    }

    .wa-typing-bubble {
      padding: 12px 16px;
      border-radius: 12px 12px 4px 12px;
      background: #dcf8c6;
      box-shadow: 0 1px 2px rgba(0,0,0,0.1);
      display: flex;
      gap: 4px;
    }

    .wa-typing-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #128c7e;
      animation: typing 1.4s infinite ease-in-out;
    }

    .wa-typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .wa-typing-dot:nth-child(3) { animation-delay: 0.4s; }

    /* Input Area */
    #wa-input-area {
      padding: 8px 12px;
      background: #f0f0f0;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    #wa-input {
      flex: 1;
      padding: 10px 14px;
      border-radius: 24px;
      border: none;
      font-size: 14px;
      outline: none;
      direction: rtl;
      font-family: inherit;
    }

    #wa-send-btn {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: none;
      background: #ccc;
      color: white;
      cursor: default;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
    }

    #wa-send-btn.active {
      background: #128c7e;
      cursor: pointer;
    }

    /* Animations */
    @keyframes pulse {
      0% { box-shadow: 0 4px 16px rgba(37, 211, 102, 0.4); }
      50% { box-shadow: 0 4px 24px rgba(37, 211, 102, 0.7); }
      100% { box-shadow: 0 4px 16px rgba(37, 211, 102, 0.4); }
    }

    @keyframes typing {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
      30% { transform: translateY(-6px); opacity: 1; }
    }

    /* Responsive */
    @media (max-width: 420px) {
      #wa-chat {
        width: calc(100vw - 20px);
        height: calc(100vh - 120px);
        right: 10px;
        bottom: 80px;
      }
    }
  </style>
</head>
<body>

<script>
// =============================================
// CONFIGURATION - Edit these values
// =============================================
var WA_NUMBER = "21600000000"; // Replace with your WhatsApp number

var QUICK_REPLIES = [
  { id: "services", label: "خدماتنا" },

var BOT_RESPONSES = {
  services: {
    text: "مرحباً بك في شركة آمنة فيزا سيرفيس! \u{1F3E2}\n\nنحن نقدم الخدمات التالية:\n\u2022 توفير فرص عمل في رومانيا وأوروبا\n\u2022 إعداد ملفات التأشيرة والهجرة\n\u2022 ترجمة الوثائق الرسمية\n\u2022 متابعة إجراءات السفارة\n\u2022 استشارات مجانية حول فرص العمل\n\n\u{1F4CD} العنوان: Avenue Habib Bourguiba, Bardo, Tunisie - Tlili Centre 3\u00e8me \u00e9tage\n\nهل تحب تعرف أكثر على حاجة معينة؟",
    followUp: ["visa", "jobs", "contact"]
  },
  visa: {

  },
  jobs: {
    text: "\u{1F4BC} فرص العمل المتاحة حالياً:\n\n\u{1F528} البناء - رومانيا\n\u{1F9F9} التنظيف - رومانيا\n\u{1F476} رعاية الأطفال - رومانيا\n\u{1F474} رعاية المسنين - رومانيا\n\u{1FA9A} النجارة - رومانيا\n\u{1F527} السباكة - رومانيا\n\u2699\uFE0F الميكانيكا - رومانيا\n\u{1F37D} المطاعم - رومانيا\n\n\u2705 جميع الوظائف تشمل:\n\u2022 عقد عمل رسمي\n\u2022 تأمين صحي\n\u2022 سكن مؤمن\n\u2022 راتب شهري ثابت\n\nهل تحب تقدّم على وظيفة؟",

var KEYWORD_MAP = [
  { keywords: ["خدم", "service", "نقدم", "تعمل"], response: "services" },
  { keywords: ["تأشير", "visa", "فيزا", "سفر"], response: "visa" },
  { keywords: ["عمل", "job", "وظيف", "خدمة", "شغل"], response: "jobs" },
  { keywords: ["وثائق", "وثيقة", "document", "ملف", "أوراق", "ورق"], response: "documents" },
  { keywords: ["متابع", "track", "status", "وين وصل", "ملفي"], response: "status" },
  { keywords: ["تواصل", "contact", "اتصل", "رقم", "هاتف", "مستشار"], response: "contact" }
];

// =============================================
// CHATBOT LOGIC
// =============================================
var waIsOpen = false;
var waStarted = false;

function waToggle() {
  waIsOpen = !waIsOpen;
  document.getElementById("wa-chat").classList.toggle("open", waIsOpen);
  document.getElementById("wa-float-btn").style.display = waIsOpen ? "none" : "flex";
  document.getElementById("wa-badge").style.display = waIsOpen ? "none" : "flex";

  if (waIsOpen && !waStarted) {
    waStarted = true;
    waAddBotMsg("مرحباً بك في شركة آمنة فيزا سيرفيس! \u{1F44B}\n\nأنا المساعد الآلي، كيف يمكنني مساعدتك اليوم؟\n\nاختر من الخيارات أدناه:", QUICK_REPLIES.map(function(q) { return q.id; }));
  }
}

function waFormatTime() {
  var now = new Date();
  return now.getHours().toString().padStart(2, "0") + ":" + now.getMinutes().toString().padStart(2, "0");
}

function waAddBotMsg(text, quickReplies, action) {
  var container = document.getElementById("wa-messages");

  // Message bubble
  var msgDiv = document.createElement("div");
  msgDiv.className = "wa-msg bot";
  msgDiv.innerHTML = '<div class="wa-bubble"><div class="wa-bubble-text">' +
    text.replace(/\n/g, "<br>") +
    '</div><div class="wa-bubble-time">' + waFormatTime() + '</div></div>';
  container.appendChild(msgDiv);

  // Quick replies
  if (quickReplies && quickReplies.length > 0) {
    var qrDiv = document.createElement("div");
    qrDiv.className = "wa-quick-replies";
    quickReplies.forEach(function(replyId) {
      var reply = QUICK_REPLIES.find(function(q) { return q.id === replyId; });
      if (!reply) return;
      var btn = document.createElement("button");
      btn.className = "wa-qr-btn";
      btn.textContent = reply.label;
      btn.onclick = function() { waHandleQuickReply(replyId); };
      qrDiv.appendChild(btn);
    });
    container.appendChild(qrDiv);
  }

  // WhatsApp action button
  if (action === "openWhatsApp") {
    var actionDiv = document.createElement("div");
    actionDiv.className = "wa-action-wrap";
    actionDiv.innerHTML = '<button class="wa-action-btn" onclick="waOpenWhatsApp()">' +
      '<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="white">' +
      '<path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>' +
      '</svg> فتح واتساب</button>';
    container.appendChild(actionDiv);
  }

  waScrollBottom();
}

function waAddUserMsg(text) {
  var container = document.getElementById("wa-messages");
  var msgDiv = document.createElement("div");
  msgDiv.className = "wa-msg user";
  msgDiv.innerHTML = '<div class="wa-bubble"><div class="wa-bubble-text">' +
    text.replace(/\n/g, "<br>") +
    '</div><div class="wa-bubble-time">' + waFormatTime() + '</div></div>';
  container.appendChild(msgDiv);
  waScrollBottom();
}

function waShowTyping() {
  var container = document.getElementById("wa-messages");
  var typingDiv = document.createElement("div");
  typingDiv.className = "wa-typing";
  typingDiv.id = "wa-typing-indicator";
  typingDiv.innerHTML = '<div class="wa-typing-bubble">' +
    '<div class="wa-typing-dot"></div>' +
    '<div class="wa-typing-dot"></div>' +
    '<div class="wa-typing-dot"></div></div>';
  container.appendChild(typingDiv);
  waScrollBottom();
}

function waHideTyping() {
  var el = document.getElementById("wa-typing-indicator");
  if (el) el.remove();
}

function waScrollBottom() {
  var container = document.getElementById("wa-messages");
  container.scrollTop = container.scrollHeight;
}

function waDetectIntent(message) {
  var lower = message.toLowerCase();
  for (var i = 0; i < KEYWORD_MAP.length; i++) {
    var map = KEYWORD_MAP[i];
    for (var j = 0; j < map.keywords.length; j++) {
      if (lower.indexOf(map.keywords[j]) !== -1) {
        return map.response;
      }
    }
  }
  return "default";
}

function waRespond(intentKey) {
  waShowTyping();
  var response = BOT_RESPONSES[intentKey] || BOT_RESPONSES["default"];
  var delay = 800 + Math.random() * 700;

  setTimeout(function() {
    waHideTyping();
    waAddBotMsg(response.text, response.followUp, response.action);
    if (response.action === "openWhatsApp") {
      setTimeout(function() { waOpenWhatsApp(); }, 1500);
    }
  }, delay);
}

function waHandleQuickReply(replyId) {
  var reply = QUICK_REPLIES.find(function(q) { return q.id === replyId; });
  if (!reply) return;
  waAddUserMsg(reply.label);
  waRespond(replyId);
}

function waSend() {
  var input = document.getElementById("wa-input");
  var text = input.value.trim();
  if (!text) return;

  waAddUserMsg(text);
  input.value = "";
  waInputChange();

  var intent = waDetectIntent(text);
  waRespond(intent);
}

function waKeyDown(e) {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    waSend();
  }
}

function waInputChange() {
  var input = document.getElementById("wa-input");
  var btn = document.getElementById("wa-send-btn");
  if (input.value.trim()) {
    btn.classList.add("active");
  } else {
    btn.classList.remove("active");
  }
}

function waOpenWhatsApp(message) {
  var msg = encodeURIComponent(message || "مرحباً، أريد الاستفسار عن خدمات التأشيرة");
  window.open("https://wa.me/" + WA_NUMBER + "?text=" + msg, "_blank");
}
</script>
